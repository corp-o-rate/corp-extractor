# Cerebrium app config for statement-extractor demo.
# Replaces runpod/handler.py; deployed into the SAME Cerebrium project as
# corp-entity-db so both apps share /persistent-storage in us-east-1.
#
# Endpoint URLs after deploy:
#   POST https://api.cortex.cerebrium.ai/v4/<project-id>/statement-extractor/extract
#   POST https://api.cortex.cerebrium.ai/v4/<project-id>/statement-extractor/extract_url
#
# The volume already holds the corp-entity-db data (entities-v6.db, USearch
# indexes, embeddinggemma-300m). On first request this app additionally pulls:
#   - Corp-o-Rate-Community/statement-extractor (T5-Gemma2, ~20 GB)
#   - google/gemma-3-12b-it-qat-q4_0-gguf      (~7 GB)
#   - fastino/gliner2-base-v1                   (~1 GB)
# So make sure the project volume has ~40 GB free before first deploy
# (resize via the REST API in the cerebrium skill if needed).

[cerebrium.deployment]
name = "statement-extractor"
python_version = "3.11"
include = ["./main.py", "./cerebrium.toml"]
exclude = [".git/*", "__pycache__/*", "*.pyc", ".pytest_cache/*"]
docker_base_image_url = "nvidia/cuda:12.4.1-cudnn-runtime-ubuntu22.04"

# Rebuild llama-cpp-python from source without AVX-512. The default wheel is
# compiled with AVX-512 and immediately SIGILLs (exit 132, "Illegal instruction")
# on the ADA_L40 host CPUs the moment the Gemma-3-12B GGUF qualifier is invoked.
# Re-installing here (after the corp-extractor wheel pulls in the binary one)
# replaces it with a build that targets the lowest-common-denominator CPU
# Cerebrium has run us on. Adds ~2 min to fresh builds.
shell_commands = [
  "pip uninstall -y llama-cpp-python",
  "CMAKE_ARGS='-DGGML_NATIVE=OFF -DGGML_AVX512=OFF -DGGML_AVX2=ON -DGGML_FMA=ON' FORCE_CMAKE=1 pip install --no-binary llama-cpp-python --no-cache-dir 'llama-cpp-python==0.3.16'",
]

[cerebrium.hardware]
# ADA_L40 (48 GB) — largest GPU available on the Cerebrium hobby plan.
# T5-Gemma2 in bf16 (~20 GB) + GLiNER2 + embedders fits comfortably; the
# Gemma-3-12B GGUF qualifier runs on CPU via llama-cpp-python so doesn't
# share VRAM. Was AMPERE_A100_40GB but that requires a paid plan upgrade.
compute = "ADA_L40"
gpu_count = 1
cpu = 8
memory = 32
provider = "aws"
region = "us-east-1"

[cerebrium.scaling]
min_replicas = 0
max_replicas = 1
cooldown = 60
replica_concurrency = 1
response_grace_period = 3600

[cerebrium.dependencies.pip]
# corp-extractor's own pyproject pulls in transformers>=5.0.0rc3 (T5Gemma2
# support landed in that RC), gliner2, accelerate, llama-cpp-python,
# fastapi/uvicorn, and corp-entity-db>=0.1.0. We don't re-declare those
# here so pip's dependency resolver picks one consistent version set.
# llama-cpp-python is reinstalled from source by shell_commands above so
# the resulting binary doesn't SIGILL on the ADA_L40 host CPU.
"corp-extractor" = ">=0.10.0"

[cerebrium.dependencies.apt]
# (none)

# Required at runtime via cerebrium secrets:
#   HF_TOKEN — for the gated google/embeddinggemma-300m and gemma-3-12b GGUF
#              models, plus the statement-extractor T5-Gemma2 model.
# Set with: cerebrium secrets set HF_TOKEN <token>
